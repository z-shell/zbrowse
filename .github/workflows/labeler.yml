---
name: 🔖 Pull Request Labeler
on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Run Labeler
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213
        with:
          sync-labels: false
